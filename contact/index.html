<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DJ Ramoz | Contact</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #fff;
      color: #111;
    }

    /* HEADER */
    header {
      background: #c40000;
      color: white;
      padding: 15px 40px;
      position: sticky;
      top: 0;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 20px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #ffdada;
    }

    /* HERO */
    .hero {
      padding: 60px 20px;
      text-align: center;
      background: #fafafa;
    }

    .hero h1 {
      font-size: 40px;
      color: #c40000;
      margin-bottom: 10px;
    }

    .hero p {
      color: #555;
    }

    /* FORM */
    .contact-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input, textarea {
      padding: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    textarea {
      min-height: 140px;
      resize: none;
    }

    .btn {
      background: #c40000;
      color: white;
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn:hover {
      background: #990000;
    }

    /* INFO */
    .info {
      margin-top: 40px;
      text-align: center;
      color: #444;
    }

    .info p {
      margin: 6px 0;
    }

    /* FOOTER */
    footer {
      background: #c40000;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    /* MOBILE */
    @media(max-width:768px){
      nav ul {
        flex-direction: column;
        gap: 10px;
      }

      .hero h1 {
        font-size: 30px;
      }
    }
  </style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="navbar">
    <div class="logo">DJ Ramoz</div>
    <nav>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="../store/index.html">Store</a></li>
        <li><a href="../index.html#about">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Contact Me</h1>
  <p>Let’s connect for bookings, collaborations, or questions.</p>
</section>

<!-- FORM -->
<div class="contact-container">
  <form id="contactForm">
    <input type="text" id="name" placeholder="Your Name" required />
    <input type="email" id="email" placeholder="Your Email" required />
    <textarea id="message" placeholder="Your Message" required></textarea>
    <button type="submit" class="btn">Send Message</button>
  </form>

  <div class="info">
    <p><strong>Email:</strong> djramoz@example.com</p>
    <p><strong>Phone:</strong> +254 700 000 000</p>
    <p><strong>Location:</strong> Nairobi, Kenya</p>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 DJ Ramoz</p>
</footer>

<script>
  const form = document.getElementById("contactForm");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();

    if (!name || !email || !message) {
      alert("Please fill all fields.");
      return;
    }

    // Later you can connect to Firebase or backend
    alert("Message sent successfully!");

    form.reset();
  });
</script>

</body>
</html>
